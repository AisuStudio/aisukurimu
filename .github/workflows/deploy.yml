name: Deploy to GitHub Pages

# Triggers: every push to main, and manual via "Run workflow" in the Actions tab.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages deployments need write access to Pages and OIDC for attestation.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deploy; queued deploys do not get cancelled.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # withastro/action handles: setup-node, install deps, run astro build,
      # and upload the dist/ folder as a Pages artifact.
      - name: Install, build, upload
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
